services:
  renatsql:
    image: mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    networks:
      - mynet
    volumes:
      - data:/app/data

  backend:
    image: postgres
    networks:
      - mynet
  
  myubuntu:
    image: ubuntu
    command: sleep 3600

networks:
  mynet:

volumes:
  data:

