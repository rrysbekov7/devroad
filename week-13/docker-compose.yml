services:
  rename_web:
    image: nginx
    ports:
      - "${MYPORT}:80"
    environment:
      NAME: ${NAME}
      AGE: ${AGE}
    networks:
      - mynewnetwork
    volumes:
      - ${MYDATA}:/app/data
  
  renarmysql:
    image: mysql
    environment:
      MSL_ROOT_PASSWORD: 1234

  backend:
    image: python
    networks:
      - mynewnetwork

  myubuntu:
    image: ubuntu
    command: sleep 3600
    networks:
      - mynewnetwork

networks:
  mynewnetwork: