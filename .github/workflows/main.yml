name: Second tasks final

on: workflow_dispatch

env:
  GLOBAL_VAR: I am from global env

jobs:
  test:
    env:
      JOB_VAR: I am from Job env
    runs-on: ubuntu-latest
    steps:
      - name: Install Checkout
        uses: actions/checkout@v4
      - name: Print global env
        run: echo $GLOBAL_VAR
      - name: Print Job env
        run: echo $JOB_VAR
      - name: Print step env
        env:
          STEP_VAR: date
        run: $STEP_VAR