name: My First PipeLine

on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1
        run: echo "Hello World!"
      - name: Step 2
        run: pwd
      - name: Step 3
        run: ls 
      # Задание 1
      - name: Who am I
        run: whoami
      # Задание 2
      - name: System Info
        run: uname -a
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Checkout
        uses: actions/checkout@v4
      - name: Print date
        run: date