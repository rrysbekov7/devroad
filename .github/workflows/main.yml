name: My new job

on: push
    
jobs:
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Install Checkout
        uses: actions/checkout@v4
      - name: Print date
        run: date
      - name: Print Hello World!
        run: echo "Hello World!"
      - name: Print Hello World! PART2"
        run: echo "Hello World! PART2"
      - name: Print Hello World! PART3
        run: echo "Hello World! PART3"
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install Checkout
        uses: actions/checkout@v4
      - name: Print I am Big boy
        run: echo "I am big boy"
      - name: Print Hello Meen
        run: echo "Hello Meen"
      - name: Print I am DevOps Engineer
        run: "I am a DevOps engineer"