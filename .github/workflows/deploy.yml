name: Deploy Portfolio

on:
  push:
    branches: [ master ]     # поменяй на master, если у тебя основная ветка master

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./project-1   # ← Важная строка!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t portfolio:latest .

      - name: Save Docker image
        run: docker save -o portfolio.tar portfolio:latest

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/portfolio   # папка на сервере, куда будем деплоить

            docker stop portfolio || true
            docker rm portfolio || true
            docker rmi portfolio:latest || true

            # Здесь позже добавим передачу образа
            echo "Docker image built successfully"
