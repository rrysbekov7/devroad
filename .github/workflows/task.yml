name: Two Jobs
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install checkout
        uses: actions/checkout@v4

      - name: Run date command
        run: date

      - name: Print Build name
        run: echo I am a Build 

      - name: Print Build name PART 2
        run: echo I am a Build too
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install checkout
        uses: actions/checkout@v4

      - name: Print test is Succeed!
        run: echo Test is Succeed!

      - name: Print some text
        run: echo That's Amazing!
